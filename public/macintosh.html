<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskOS · Macintosh</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="macintosh.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="theme-router.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <a class="settings-link" href="settings.html">Settings</a>
    <main class="main-shell root">
        <section class="window">
            <div class="titlebar">
                <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <span>Now Playing</span>
                <span style="font-family:'JetBrains Mono', monospace;">deskOS</span>
            </div>
            <div class="grid-two">
                <img id="albumArt" alt="Album art" />
                <div class="info">
                    <span class="badge">Now Playing</span>
                    <h1 id="songtitle">(song title)</h1>
                    <p id="songinfo" class="meta">(artist) – (album)</p>
                    <a id="playlistname" class="badge" href="#">(playlist)</a>
                    <div class="controls">
                        <div class="row">
                            <button id="previousBtn" class="button material-symbols-outlined" onclick="action_previous()">skip_previous</button>
                            <button id="playPauseBtn" class="button material-symbols-outlined" onclick="action_toggle_play()">play_arrow</button>
                            <button id="nextBtn" class="button material-symbols-outlined" onclick="action_next()">skip_next</button>
                        </div>
                        <div class="row">
                            <button id="shuffleBtn" class="button material-symbols-outlined" onclick="action_shuffle()">shuffle</button>
                            <button id="repeatBtn" class="button material-symbols-outlined" onclick="action_repeat()">repeat</button>
                            <button id="likeBtn" class="button material-symbols-outlined" onclick="action_like_unlike()">favorite_border</button>
                        </div>
                    </div>
                    <div class="timeline">
                        <div class="time-row"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
                        <input id="seekBar" type="range" min="0" max="100" value="0" />
                    </div>
                </div>
            </div>
        </section>

        <section class="window">
            <div class="titlebar"><div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><span>Queued</span><span style="font-family:'JetBrains Mono', monospace;">next</span></div>
            <div class="popup">
                <img id="upnext_art" alt="Next art" />
                <h3 id="upnext_songtitle">(song)</h3>
                <p id="upnext_info">(artist – album)</p>
            </div>
            <div class="dock">
                <button id="openDrawer" onclick="action_search()">Discover</button>
                <button id="playAlbum" onclick="action_go_to_album()">Album</button>
                <button onclick="action_home()">Home</button>
            </div>
        </section>
    </main>

    <aside id="drawer">
        <div class="drawer-header">
            <div class="tabs">
                <button class="tab-button active" data-tab="playlists">Playlists</button>
                <button class="tab-button" data-tab="search">Search</button>
            </div>
            <button id="closeDrawer" class="tab-button">✕</button>
        </div>
        <div class="tab-pane active" id="tab-playlists">
            <div class="list" id="playlistsList"></div>
        </div>
        <div class="tab-pane" id="tab-search">
            <form id="searchForm">
                <input id="searchInput" type="text" placeholder="Search tracks or albums" autocomplete="off" />
                <button type="submit" class="tab-button">Go</button>
            </form>
            <div class="list" id="searchResults"></div>
        </div>
    </aside>
    <div id="backdrop"></div>
</body>
</html>
