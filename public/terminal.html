<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskOS · Terminal</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="terminal.css" />
    <script src="theme-router.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <a class="settings-link" href="settings.html">Settings</a>
    <main class="main-shell root">
        <section class="box">
            <div class="label">now playing</div>
            <div class="grid-two">
                <img id="albumArt" alt="Album art" />
                <div>
                    <h1 id="songtitle">(song title)</h1>
                    <p id="songinfo" class="meta">(artist) – (album)</p>
                    <div class="label">playlist</div>
                    <a id="playlistname" class="meta" href="#">(playlist)</a>
                    <div class="controls" style="margin-top:10px;">
                        <div class="row">
                            <div id="previousBtn" class="btn" role="button" onclick="action_previous()"><< prev</div>
                            <div id="playPauseBtn" class="btn" role="button" onclick="action_toggle_play()">[ play ]</div>
                            <div id="nextBtn" class="btn" role="button" onclick="action_next()">next >></div>
                        </div>
                        <div class="row">
                            <div id="shuffleBtn" class="btn" onclick="action_shuffle()">shuffle</div>
                            <div id="repeatBtn" class="btn" onclick="action_repeat()">repeat</div>
                            <div id="likeBtn" class="btn" onclick="action_like_unlike()">favorite</div>
                        </div>
                    </div>
                    <div class="timeline" style="margin-top:10px;">
                        <div class="time-row"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
                        <input id="seekBar" type="range" min="0" max="100" value="0" />
                    </div>
                </div>
            </div>
        </section>

        <section class="box next-box">
            <div class="label">queued</div>
            <img id="upnext_art" alt="Next album art" />
            <div>
                <strong id="upnext_songtitle">(song)</strong>
                <div id="upnext_info" class="meta">(artist – album)</div>
            </div>
            <div class="dock">
                <div id="openDrawer" class="btn" onclick="action_search()">discover</div>
                <div id="playAlbum" class="btn" onclick="action_go_to_album()">album</div>
                <div class="btn" onclick="action_home()">home</div>
            </div>
        </section>
    </main>

    <aside id="drawer">
        <div class="drawer-header">
            <div class="tabs">
                <button class="tab-button active" data-tab="playlists">Playlists</button>
                <button class="tab-button" data-tab="search">Search</button>
            </div>
            <button id="closeDrawer" class="tab-button">✕</button>
        </div>
        <div class="tab-pane active" id="tab-playlists">
            <div class="list" id="playlistsList"></div>
        </div>
        <div class="tab-pane" id="tab-search">
            <form id="searchForm">
                <input id="searchInput" type="text" placeholder="Search tracks or albums" autocomplete="off" />
                <button type="submit" class="tab-button">Go</button>
            </form>
            <div class="list" id="searchResults"></div>
        </div>
    </aside>
    <div id="backdrop"></div>
</body>
</html>
